<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>九球三人追分 · 领奖台专属稿(加装饰)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#d4af37; --accent-bright:#f5d76e; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:#070a09; font-family:"Noto Sans SC",sans-serif; color:#e8eae9; padding:40px 24px 80px; }
  h1{ font-size:22px; text-align:center; margin-bottom:6px; }
  p.sub{ text-align:center; color:#7a857f; font-size:13px; margin-bottom:36px; }
  .stage{ display:flex; flex-wrap:wrap; gap:48px; justify-content:center; }
  .frame{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .cap{ font-size:14px; color:#aeb6b1; } .cap b{ color:#e8c967; }
  .scaler{ width:378px; height:672px; overflow:hidden; border-radius:28px; box-shadow:0 30px 80px rgba(0,0,0,.6); }
  .poster{ width:1080px; height:1920px; transform:scale(.35); transform-origin:top left; position:relative; overflow:hidden;
    background:#0a0f0d; display:flex; flex-direction:column; }

  .split{ position:absolute; inset:0;
    background:linear-gradient(150deg,#213e4f 0%,#162a22 45%,#0a0f0d 100%); opacity:.5; }
  .glow{ position:absolute; top:-200px; left:50%; transform:translateX(-50%); width:900px; height:600px;
    border-radius:50%; background:radial-gradient(circle,rgba(212,175,55,.22),transparent 65%); }

  /* —— 装饰层 —— */
  /* 冠军身后金色光芒射线（canvas 用细三角复刻） */
  .rays{ position:absolute; top:340px; left:50%; transform:translateX(-50%); width:1100px; height:1100px;
    background:repeating-conic-gradient(from 0deg at 50% 50%, rgba(212,175,55,.11) 0deg 3.5deg, transparent 3.5deg 15deg);
    -webkit-mask:radial-gradient(circle at 50% 50%, #000 0%, rgba(0,0,0,.5) 30%, transparent 56%);
    mask:radial-gradient(circle at 50% 50%, #000 0%, rgba(0,0,0,.5) 30%, transparent 56%); }
  /* 冠军光环 */
  .halo{ position:absolute; top:430px; left:50%; transform:translateX(-50%); width:560px; height:560px; border-radius:50%;
    background:radial-gradient(circle, rgba(212,175,55,.28), transparent 62%); }
  /* 彩色纸屑 */
  .confetti{ position:absolute; inset:0; }
  .cf{ position:absolute; opacity:.85; }

  .inner{ position:relative; display:flex; flex-direction:column; align-items:center; padding:96px 60px 70px; flex:1; }

  .kicker{ display:flex; align-items:center; gap:18px; color:var(--accent); font-family:"Oswald"; font-weight:600;
    font-size:40px; letter-spacing:10px; }
  .kicker .dot{ width:14px; height:14px; border-radius:50%; background:var(--accent); }
  .mtype{ margin-top:26px; color:#c9d1cc; font-size:34px; font-weight:500; }

  .podium{ margin-top:64px; width:100%; display:flex; align-items:flex-end; justify-content:center; gap:18px; }
  .col{ display:flex; flex-direction:column; align-items:center; position:relative; }
  .col .av{ border-radius:40px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; overflow:hidden; }
  .col .nm{ margin-top:22px; font-weight:900; color:#fff; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .col .sc{ font-family:"Oswald"; font-weight:700; line-height:1; }
  /* 台座：正面 + 顶面(3D) */
  .col .ped{ margin-top:20px; width:100%; border-radius:14px 14px 0 0; position:relative;
    display:flex; align-items:flex-start; justify-content:center; padding-top:30px; }
  .col .ped .top{ position:absolute; top:-14px; left:0; right:0; height:18px; border-radius:50%/14px; }
  .col .ped .rk{ font-family:"Noto Sans SC"; font-weight:900; }

  .c1{ width:340px; }
  .c1 .av{ width:240px; height:240px; border:6px solid var(--accent); box-shadow:0 0 70px rgba(212,175,55,.55);
    background:linear-gradient(150deg,#2d4a3a,#16271d); font-size:130px; }
  .c1 .crown{ font-size:74px; margin-bottom:4px; filter:drop-shadow(0 0 18px rgba(212,175,55,.7)); }
  .c1 .nm{ font-size:50px; } .c1 .sc{ font-size:120px; color:var(--accent); text-shadow:0 0 30px rgba(212,175,55,.5); }
  .c1 .ped{ height:300px; background:linear-gradient(180deg,rgba(212,175,55,.30),rgba(212,175,55,.05)); border:2px solid rgba(212,175,55,.55); border-bottom:none; }
  .c1 .ped .top{ background:rgba(212,175,55,.5); }
  .c1 .ped .rk{ font-size:120px; color:var(--accent); }
  /* 冠军星芒 */
  .c1 .spark{ position:absolute; color:var(--accent-bright); font-size:46px; }

  .c2{ width:300px; }
  .c2 .av{ width:175px; height:175px; border:5px solid #cdd6db; box-shadow:0 0 40px rgba(205,214,219,.3);
    background:linear-gradient(150deg,#3a4750,#1c2429); font-size:96px; }
  .c2 .nm{ font-size:40px; } .c2 .sc{ font-size:84px; color:#cdd6db; }
  .c2 .ped{ height:200px; background:linear-gradient(180deg,rgba(205,214,219,.22),rgba(205,214,219,.04)); border:2px solid rgba(205,214,219,.42); border-bottom:none; }
  .c2 .ped .top{ background:rgba(205,214,219,.42); }
  .c2 .ped .rk{ font-size:96px; color:#cdd6db; }

  .c3{ width:300px; }
  .c3 .av{ width:175px; height:175px; border:5px solid #d0925a; box-shadow:0 0 40px rgba(208,146,90,.3);
    background:linear-gradient(150deg,#4a3a2c,#241c16); font-size:96px; }
  .c3 .nm{ font-size:40px; } .c3 .sc{ font-size:84px; color:#d0925a; }
  .c3 .ped{ height:150px; background:linear-gradient(180deg,rgba(208,146,90,.22),rgba(208,146,90,.04)); border:2px solid rgba(208,146,90,.42); border-bottom:none; }
  .c3 .ped .top{ background:rgba(208,146,90,.42); }
  .c3 .ped .rk{ font-size:96px; color:#d0925a; }

  .foot{ margin-top:auto; display:flex; align-items:center; justify-content:space-between; width:100%; padding-top:40px; }
  .foot .brand{ display:flex; flex-direction:column; gap:6px; }
  .foot .brand b{ font-size:40px; color:#fff; font-weight:900; }
  .foot .brand span{ font-size:28px; color:#a0a8a4; }
  .foot .qr{ width:180px; height:180px; border-radius:28px; background:#fff; display:flex; align-items:center;
    justify-content:center; font-size:100px; border:5px solid var(--accent); }
</style>
</head>
<body>
  <h1>九球三人追分 · 领奖台专属稿(加装饰)</h1>
  <p class="sub">金色光芒射线 · 飘落纸屑 · 冠军光环 + 星芒 · 3D 立体台座</p>
  <div class="stage">

    <div class="frame">
      <div class="cap"><b>① 标准三人</b> · 加装饰</div>
      <div class="scaler"><div class="poster">
        <div class="split"></div><div class="glow"></div>
        <div class="rays"></div><div class="halo"></div>
        <div class="confetti">
          <div class="cf" style="left:120px;top:120px;width:18px;height:18px;background:#f5d76e;border-radius:50%;transform:rotate(20deg)"></div>
          <div class="cf" style="left:240px;top:220px;width:14px;height:24px;background:#cdd6db;transform:rotate(35deg)"></div>
          <div class="cf" style="left:340px;top:90px;width:16px;height:16px;background:#4ade80;transform:rotate(10deg)"></div>
          <div class="cf" style="left:520px;top:60px;width:14px;height:14px;background:#d0925a;border-radius:50%"></div>
          <div class="cf" style="left:700px;top:110px;width:20px;height:12px;background:#f5d76e;transform:rotate(-25deg)"></div>
          <div class="cf" style="left:840px;top:200px;width:16px;height:16px;background:#7ec6ec;border-radius:50%;transform:rotate(15deg)"></div>
          <div class="cf" style="left:940px;top:130px;width:14px;height:22px;background:#cdd6db;transform:rotate(-40deg)"></div>
          <div class="cf" style="left:160px;top:360px;width:14px;height:14px;background:#d0925a;border-radius:50%"></div>
          <div class="cf" style="left:900px;top:380px;width:16px;height:16px;background:#f5d76e;transform:rotate(30deg)"></div>
          <div class="cf" style="left:60px;top:520px;width:12px;height:20px;background:#4ade80;transform:rotate(45deg)"></div>
          <div class="cf" style="left:1000px;top:520px;width:14px;height:14px;background:#7ec6ec;border-radius:50%"></div>
          <div class="cf" style="left:430px;top:160px;width:12px;height:12px;background:#f5d76e;border-radius:50%"></div>
        </div>
        <div class="inner">
          <div class="kicker"><i class="dot"></i>BATTLE REPORT<i class="dot"></i></div>
          <div class="mtype">九球追分 · 房间 7K2M · 3 人</div>
          <div class="podium">
            <div class="col c2"><div class="av">张</div><div class="nm">张三</div><div class="sc">9</div><div class="ped"><span class="top"></span><span class="rk">亚</span></div></div>
            <div class="col c1">
              <span class="spark" style="top:-30px;left:30px">✦</span>
              <span class="spark" style="top:40px;right:18px;font-size:32px">✦</span>
              <div class="crown">👑</div><div class="av">王</div><div class="nm">王小五</div><div class="sc">11</div>
              <div class="ped"><span class="top"></span><span class="rk">冠</span></div>
            </div>
            <div class="col c3"><div class="av">李</div><div class="nm">李四</div><div class="sc">6</div><div class="ped"><span class="top"></span><span class="rk">季</span></div></div>
          </div>
          <div class="foot"><div class="brand"><b>击球帮</b><span>长按二维码 · 立刻看战报</span></div><div class="qr">▦</div></div>
        </div>
      </div></div>
    </div>

  </div>
</body>
</html>
