name: zhuoqiu

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zhuoqiu}
      POSTGRES_USER: ${POSTGRES_USER:-zhuoqiu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zhuoqiu_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zhuoqiu} -d ${POSTGRES_DB:-zhuoqiu}"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3009
      GLOBAL_PREFIX: v1
      DATABASE_URL: postgresql://${POSTGRES_USER:-zhuoqiu}:${POSTGRES_PASSWORD:-zhuoqiu_dev}@postgres:5432/${POSTGRES_DB:-zhuoqiu}?schema=public
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      DEV_FIXED_SMS_CODE: ${DEV_FIXED_SMS_CODE:-123456}
      SEED_SUPER_ADMIN_USERNAME: ${SEED_SUPER_ADMIN_USERNAME:-admin}
      SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD:-Admin@123456}
      SEED_SUPER_ADMIN_NAME: ${SEED_SUPER_ADMIN_NAME:-超级管理员}
      SEED_DEV_VENUE_PHONE: ${SEED_DEV_VENUE_PHONE:-13900000001}
      UPLOAD_ROOT: /app/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      OSS_ENABLED: ${OSS_ENABLED:-false}
      OSS_REGION: ${OSS_REGION:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ROLE_ARN: ${OSS_ROLE_ARN:-}
    volumes:
      - uploads:/app/uploads
    # 默认不对外暴露：流量统一走 caddy → docker network。
    # LAN 调试需要直连 API 时取消下面注释。
    # ports:
    #   - "${API_PORT:-3009}:3009"

  admin:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    # ports:
    #   - "${ADMIN_PORT:-8081}:80"

  h5:
    build:
      context: ./billiards-score
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    # ports:
    #   - "${H5_PORT:-8080}:80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - server
      - admin
      - h5
    ports:
      - "80:80"
      - "443:443"
      # HTTP/3 (QUIC) 用 UDP 443，加速握手；不要可以删
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # 自动签发的证书 + ACME 状态（必须持久化，否则每次重启都重签会被 Let's Encrypt 限流）
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
